<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 320px; min-height: 200px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1e1e1e; color: #fff; font-size: 0.8125rem; }
    #app { display: flex; flex-direction: column; }
    #header { display: flex; align-items: center; gap: 0.625rem; padding: 0.75rem 1rem; border-bottom: 1px solid #3d3d3d; }
    #header svg { width: 1.25rem; height: 1.25rem; flex-shrink: 0; }
    #header .title { font-size: 0.875rem; font-weight: 600; letter-spacing: -0.02em; }
    #header .spacer { flex: 1; }
    #scene-container { display: flex; flex-direction: column; padding: 1rem; gap: 1rem; }

    .btn-icon { background: none; border: none; color: #999; cursor: pointer; padding: 0.25rem; display: flex; align-items: center; }
    .btn-icon:hover { color: #fff; }

    .status { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 0.75rem; background: #2c2c2c; border-radius: 0.5rem; border: 1px solid; }
    .status-idle { border-color: #3d3d3d; }
    .status-idle .dot { width: 0.5rem; height: 0.5rem; border-radius: 50%; background: #0fa958; }
    .status-idle .text { font-size: 0.75rem; color: #999; }
    .status-warning { border-color: rgba(255, 190, 11, 0.3); }
    .status-warning .dot { width: 0.5rem; height: 0.5rem; border-radius: 50%; background: #ffbe0b; animation: pulse 2s infinite; }
    .status-warning .text { font-size: 0.75rem; color: #ffbe0b; }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    .field { display: flex; flex-direction: column; gap: 0.25rem; }
    .field label { font-size: 0.6875rem; font-weight: 500; color: #999; text-transform: uppercase; letter-spacing: 0.04em; }
    .field input { padding: 0.375rem 0.75rem; background: #2c2c2c; border: 1px solid #3d3d3d; border-radius: 0.375rem; font-size: 0.8125rem; color: #fff; outline: none; font-family: inherit; }
    .field input:focus { border-color: #7b61ff; }
    .field input::placeholder { color: #666; }
    .field input.mono { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.75rem; }

    .btn-primary { display: flex; align-items: center; justify-content: center; gap: 0.5rem; width: 100%; padding: 0.625rem 1rem; background: #7b61ff; color: #fff; border: none; border-radius: 0.5rem; font-size: 0.8125rem; font-weight: 500; cursor: pointer; font-family: inherit; }
    .btn-primary:hover { background: #6d4fe8; }
    .btn-secondary { display: flex; align-items: center; justify-content: center; gap: 0.5rem; width: 100%; padding: 0.5rem 1rem; background: none; color: #999; border: none; border-radius: 0.5rem; font-size: 0.75rem; cursor: pointer; font-family: inherit; }
    .btn-secondary:hover { color: #fff; }

    .info-box { display: flex; flex-direction: column; gap: 0.5rem; padding: 0.75rem; background: #2c2c2c; border-radius: 0.5rem; border: 1px solid #3d3d3d; }
    .info-row { display: flex; align-items: center; justify-content: space-between; }
    .info-row .label { font-size: 0.6875rem; color: #999; }
    .info-row .value { font-size: 0.75rem; color: #fff; }

    .hint { padding: 0.5rem 0.75rem; background: rgba(44,44,44,0.5); border-radius: 0.375rem; border: 1px solid rgba(61,61,61,0.5); font-size: 0.625rem; color: #999; line-height: 1.5; }
    .hint b { color: #bbb; font-weight: 500; }

    .onboarding { display: flex; flex-direction: column; align-items: center; gap: 0.75rem; padding: 1.5rem 0; }
    .onboarding .icon-wrap { width: 3rem; height: 3rem; border-radius: 0.75rem; background: rgba(123,97,255,0.1); display: flex; align-items: center; justify-content: center; }
    .onboarding .text { text-align: center; }
    .onboarding .text h3 { font-size: 0.875rem; font-weight: 500; }
    .onboarding .text p { font-size: 0.6875rem; color: #999; margin-top: 0.25rem; line-height: 1.5; padding: 0 1rem; }

    .spacer { flex: 1; }

    /* Settings */
    .key-item { display: flex; align-items: center; gap: 0.625rem; padding: 0.625rem 0.75rem; background: #2c2c2c; border-radius: 0.5rem; border: 1px solid #3d3d3d; cursor: pointer; }
    .key-item.active { border-color: rgba(123,97,255,0.3); }
    .key-item .dot { width: 0.5rem; height: 0.5rem; border-radius: 50%; background: #3d3d3d; flex-shrink: 0; }
    .key-item.active .dot { background: #7b61ff; }
    .key-item .name { font-size: 0.8125rem; flex: 1; }
    .key-item .key { font-size: 0.6875rem; color: #999; font-family: 'SF Mono', 'Fira Code', monospace; }
    .key-item .del { background: none; border: none; color: #666; cursor: pointer; padding: 0.25rem; display: flex; flex-shrink: 0; }
    .key-item .del:hover { color: #f24822; }

    .add-row { display: flex; gap: 0.5rem; margin-top: 0.75rem; }
    .add-row input { padding: 0.375rem 0.625rem; background: #2c2c2c; border: 1px solid #3d3d3d; border-radius: 0.375rem; font-size: 0.8125rem; color: #fff; outline: none; font-family: inherit; min-width: 0; }
    .add-row input:focus { border-color: #7b61ff; }
    .add-row input:first-child { width: 5.5rem; flex-shrink: 0; }
    .add-row input:nth-child(2) { flex: 1; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.75rem; }
    .add-row input::placeholder { color: #666; }
    .add-row button { padding: 0.375rem 0.625rem; background: #7b61ff; border: none; border-radius: 0.375rem; color: #fff; cursor: pointer; font-size: 0.8125rem; display: flex; align-items: center; flex-shrink: 0; }
    .add-row button:hover { background: #6d4fe8; }

    .key-hint { font-size: 0.6875rem; color: #666; margin-top: 0.5rem; line-height: 1.4; }

    .section-label { font-size: 0.6875rem; font-weight: 500; color: #999; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 0.5rem; }

    .icon { display: inline-flex; align-items: center; }
  </style>
</head>
<body>
  <div id="app">
    <div id="header"></div>
    <div id="scene-container"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
